name: Model Training CICD

permissions:
  contents: write
  pull-requests: write

on: [push]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: iterative/setup-cml@v2

      - name: Train model
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -r requirements.txt
          python train_model.py

          echo "## RF and LR Model Score" > report.md
          cat scores.txt >> report.md

          echo "## Confusion Matrix & Feature Importance" >> report.md
          echo '![](./ConfusionMatrix.png "ConfusionMatrix")' >> report.md
          echo '![](./FeatureImportance.png "FeatureImportance")' >> report.md

          cml comment create report.md
